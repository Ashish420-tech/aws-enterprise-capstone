apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-enterprise-capstone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aws-enterprise-capstone
  template:
    metadata:
      labels:
        app: aws-enterprise-capstone
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001

      containers:
      - name: app
        image: "742820980479.dkr.ecr.ap-south-1.amazonaws.com/aws-enterprise-capstone/app:latest"
        imagePullPolicy: Always

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

        ports:
        - containerPort: 5000

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
