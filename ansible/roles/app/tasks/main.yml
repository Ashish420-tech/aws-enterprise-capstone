---
- name: Ensure app directory
  ansible.builtin.file:
    path: /opt/enterprise-app
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'

- name: ECR login
  ansible.builtin.shell: |
    aws ecr get-login-password --region ap-south-1 | docker login \
    --username AWS \
    --password-stdin 742820980479.dkr.ecr.ap-south-1.amazonaws.com
  args:
    executable: /bin/bash
  changed_when: false

- name: Pull application image
  community.docker.docker_image:
    name: 742820980479.dkr.ecr.ap-south-1.amazonaws.com/aws-enterprise-capstone/app:latest
    source: pull
    force_source: true

- name: Remove old container
  community.docker.docker_container:
    name: enterprise-app
    state: absent
    force_kill: true

- name: Run application container from ECR
  community.docker.docker_container:
    name: enterprise-app
    image: 742820980479.dkr.ecr.ap-south-1.amazonaws.com/aws-enterprise-capstone/app:latest
    state: started
    restart_policy: unless-stopped
    published_ports:
      - "5000:5000"
