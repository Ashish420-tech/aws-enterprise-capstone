---
- name: Install Docker
  ansible.builtin.dnf:
    name:
      - docker
    state: present
  become: true

- name: Enable Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  become: true

- name: Add ec2-user to docker group
  ansible.builtin.user:
    name: ec2-user
    groups: docker
    append: true
  become: true
